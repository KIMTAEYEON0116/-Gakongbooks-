<!-- ── LIBRARY PAGE ── -->
  <div class="page" id="pg-lib">
    <div class="lib-header">
      <!-- 왼쪽 정렬 그룹: 타이틀 + 통계 정보 -->
      <div class="lib-header-left">
        <div class="lib-title-group">
          <h2>내 서재</h2>
          <p>책 등을 클릭하면 내가 남긴 감상을 볼 수 있어요.</p>
        </div>

        <div class="lib-stats">
          <div>
            <div class="lib-stat-n" id="lib-count">0</div>
            <div class="lib-stat-l">담아둔 책</div>
          </div>
          <div>
            <div class="lib-stat-n" id="lib-writings-count">0</div>
            <div class="lib-stat-l">남긴 감상</div>
          </div>
          <div>
            <div class="lib-stat-n" id="lib-chat-count">0</div>
            <div class="lib-stat-l">작성한 댓글</div>
          </div>
        </div>
      </div>

      <!-- 오른쪽 끝: 프로필 카드만 배치 -->
      <div class="lib-header-right">
        <!-- 프로필 카드 -->
        <div class="lib-profile-card" id="lib-profile-card">
          <div class="lib-profile-avatar" id="lib-profile-avatar">독</div>
          <div class="lib-profile-info">
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="lib-profile-name" id="lib-profile-name">독자</div>
              <button class="lib-profile-edit-btn" onclick="openProfileEditModal()" title="프로필 편집">⚙️ 편집</button>
            </div>
            <div class="lib-profile-email" id="lib-profile-email"></div>
            <div class="lib-profile-since">가공독서회 회원</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 내 서재 탭 영역 (넓고 세련된 갭 배치 완료) -->
    <div class="lib-tabs">
      <button class="lib-tab-btn active" id="lib-tab-saved" onclick="switchLibTab(&#39;saved&#39;)">담아둔 책</button>
      <button class="lib-tab-btn" id="lib-tab-archive" onclick="switchLibTab(&#39;archive&#39;)">참여 아카이브 <span
          id="lib-arc-badge"
          style="display:none;font-size:10px;background:#4a7a3a;color:#fff;border-radius:10px;padding:1px 6px;margin-left:4px;"></span></button>
    </div>
    <div class="shelf-area" id="shelf-area">
      <div class="shelf-label">담아둔 책</div>
      <div class="shelf-row">
        <div class="books-row" id="books-row">
          <div style="font-size:13px;color:var(--text-faint);padding:20px 0;">'내 서재에 담기'로 책을 모아보세요.</div>
        </div>
        <div class="shelf-plank"></div>
      </div>

      <!-- 내가 남긴 댓글 책장 추가 -->
      <div class="shelf-label" style="margin-top:24px;">내가 남긴 댓글</div>
      <div class="shelf-row">
        <div class="books-row" id="my-comments-books-row">
          <div style="font-size:13px;color:var(--text-faint);padding:20px 0;">아직 남긴 감상이나 댓글이 없어요.</div>
        </div>
        <div class="shelf-plank"></div>
      </div>

      <div class="book-detail-panel" id="lib-bdp">
        <div class="bdp-top" id="lib-bdp-top" onclick="if(selLibBook) { openDetail(selLibBook); }"
          style="cursor:pointer;" title="책 상세 페이지로 이동">
          <div class="bdp-cover" id="lib-bdp-cover"></div>
          <div>
            <div class="bdp-title" id="lib-bdp-title"></div>
            <div class="bdp-sub" id="lib-bdp-sub"></div>
          </div>
        </div>
        <div class="bdp-body">
          <div class="bdp-qlbl">MY IMPRESSION</div>
          <div id="lib-bdp-writings" class="bdp-writings"></div>
          <div class="bdp-qdate" id="lib-bdp-qdate"></div>
        </div>
        <div class="bdp-tags-row" id="lib-bdp-tags"></div>
      </div>
    </div>

    <!-- 참여 아카이브 탭 -->
    <div class="arc-shelf-area" id="arc-shelf-area">
      <div class="shelf-label" style="margin-bottom:4px;">참여하고 종료된 독서방</div>
      <div class="arc-shelf-notice">아카이브는 독서방 종료 후 생성된 감상 기록집이에요. 내가 참여한 독서방이 종료되면 여기에 보관돼요.</div>
      <div class="arc-shelf-row">
        <div class="arc-books-row" id="arc-books-row">
          <div class="arc-empty">참여한 독서방이 종료되면 여기에 아카이브가 쌓여요.</div>
        </div>
        <div class="arc-shelf-plank"></div>
      </div>
      <div class="arc-bdp" id="arc-lib-bdp">
        <div class="arc-bdp-top">
          <div class="arc-bdp-cover" id="arc-lib-bdp-cover"></div>
          <div style="flex:1;min-width:0;">
            <div class="arc-bdp-title" id="arc-lib-bdp-title"></div>
            <div class="arc-bdp-sub" id="arc-lib-bdp-sub"></div>
          </div>
          <button class="arc-bdp-btn" id="arc-lib-bdp-btn" onclick="openArchiveFromLib()">아카이브 보기</button>
        </div>
      </div>
    </div>
  </div>
